<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lit uP · NDF Direction</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#f5f6f8;--card:#fff;--card-alt:#fafbfc;--border:#e0e4ec;--text-1:#1a202c;--text-2:#4a5568;--text-3:#8896a8;
--accent:#5b63e0;--accent-bg:rgba(91,99,224,.06);--green:#16a34a;--green-bg:rgba(22,163,74,.06);
--red:#dc2626;--red-bg:rgba(220,38,38,.06);--amber:#d97706;--amber-bg:rgba(217,119,6,.06);--violet:#7c3aed;--violet-bg:rgba(124,58,237,.06);
--mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:13.5px}
body{background:var(--bg);color:var(--text-1);font-family:var(--sans);line-height:1.6}
.hd{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:#fff}
.logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#7c3aed,#6366f1);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:9px;color:#fff;flex-shrink:0}
.bg-grp{display:flex;gap:4px;padding:3px;background:var(--card-alt);border-radius:var(--radius);border:1px solid var(--border)}
.b{display:inline-flex;align-items:center;gap:4px;padding:7px 12px;border-radius:var(--radius);font-size:11.5px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;font-family:var(--sans)}.b:hover{transform:translateY(-1px)}
.b-p{background:var(--accent);color:#fff;border:1px solid var(--accent);box-shadow:0 2px 8px rgba(91,99,224,.2)}
.b-g{background:var(--green-bg);color:var(--green);border:1px solid rgba(22,163,74,.2)}
.b-v{background:var(--violet-bg);color:var(--violet);border:1px solid rgba(124,58,237,.2)}
.b-d{background:#fff;color:var(--text-2);border:1px solid var(--border)}.b-d:hover{border-color:var(--accent);color:var(--accent)}
.b-r{background:var(--red-bg);color:var(--red);border:1px solid rgba(220,38,38,.15)}
.content{max-width:1200px;margin:0 auto;padding:20px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{background:var(--card-alt);padding:9px 10px;text-align:left;border-bottom:2px solid var(--border);color:var(--text-3);font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;font-weight:600}
td{padding:8px 10px;border-bottom:1px solid #f0f2f5;vertical-align:middle}
tr:hover{background:rgba(91,99,224,.02)}
.stat-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;text-align:center;flex:1;min-width:110px;box-shadow:var(--shadow)}
.stat-v{font-size:22px;font-weight:800;font-family:var(--mono)}.stat-l{font-size:9.5px;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:#fff;border:1px solid var(--border);border-radius:14px;padding:24px;max-width:900px;width:95%;max-height:85vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.12)}
.modal h3{font-size:16px;margin-bottom:14px;font-weight:700}
.empty{text-align:center;padding:50px;color:var(--text-3)}.empty h3{font-size:16px;color:var(--text-2);margin-bottom:8px}
.inp{background:#fff;color:var(--text-1);border:1.5px solid var(--border);border-radius:var(--radius);padding:6px 10px;font-size:12px;font-family:var(--sans);outline:none;transition:all .2s}.inp:focus{border-color:var(--accent)}
@media(max-width:600px){.hd{padding:10px 12px}.content{padding:14px}.stat-row{flex-direction:column}}
</style>
</head>
<body>
<script>if(localStorage.getItem("litup_pwd_dir")!=="litup-dir-2026"){document.body.innerHTML='<div style="font-family:system-ui;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0f1019;color:#e2e8f0"><div style="text-align:center;max-width:340px"><h2 style="margin-bottom:8px">🔒 Accès Direction</h2><p style="color:#94a3b8;font-size:12px;margin-bottom:16px">Entrez le mot de passe pour accéder à la validation des NDF.</p><input id="gPwd" type="password" placeholder="Mot de passe" style="width:100%;padding:10px 14px;background:#1a1b2e;border:1.5px solid #2d2f45;border-radius:8px;color:#e2e8f0;font-size:14px;outline:none;margin-bottom:8px" onkeydown="if(event.key===\'Enter\')gCheck()"><div id="gErr" style="color:#ef4444;font-size:11px;min-height:16px"></div><button onclick="gCheck()" style="width:100%;padding:10px;margin-top:6px;background:#f59e0b;color:#000;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">Accéder</button></div></div>';document.getElementById("gPwd").focus();window.gCheck=function(){var p=document.getElementById("gPwd").value;if(p==="litup-dir-2026"){localStorage.setItem("litup_pwd_dir",p);location.reload()}else{document.getElementById("gErr").textContent="Mot de passe incorrect";document.getElementById("gPwd").style.borderColor="#ef4444"}};throw"auth"}</script>
<div class="hd">
  <div style="display:flex;align-items:center;gap:8px">
    <div class="logo">DIR</div>
    <div><div style="font-weight:700;font-size:14px;letter-spacing:-.3px">Notes de frais — Direction</div><div style="font-size:9px;color:var(--text-3)">Lit uP · 2026</div></div>
    <span id="syncStatus" style="font-size:20px;margin-left:8px" title="Synchronisation Cloud">☁️</span>
    <div style="font-size:8px;color:var(--text-3);margin-left:4px;line-height:1.4">☁️ synchronisé<br>🔄 envoi en cours<br>⚠️ erreur connexion</div>
    <div id="dirLabel" style="font-size:11px;color:var(--text-2);border-left:1px solid var(--border);padding-left:8px;margin-left:4px"></div>
  </div>
  <div style="flex:1"></div>
  <div class="bg-grp">
    <button class="b b-p" onclick="loadFromSheet()" title="Charger les NDF depuis Google Sheet">☁️ Cloud</button>
    <button class="b b-v" onclick="exportCompta()">📤 Export comptable</button>
    <button class="b b-d" onclick="majCodes()" id="btnMaj" title="Mettre à jour les codes projets depuis Airtable">🔄</button><span id="majStatus" style="font-size:10px;margin-left:2px;vertical-align:middle"></span>
  </div>
  <div class="bg-grp"><button class="b b-d" onclick="location.href='index.html'" title="Retour page d'accueil">🏠</button></div>
</div>
<div class="content" id="main"></div>
<div id="modalC"></div>

<script>
const $=id=>document.getElementById(id);
const fmt=n=>n==null?"":n.toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2})+" €";
const STATUTS=["brouillon","à envoyer","envoyée","validée","réglée"];
const STY={"brouillon":{e:"📝",c:"#94a3b8"},"à envoyer":{e:"📨",c:"#d97706"},"envoyée":{e:"✉️",c:"#2563eb"},"validée":{e:"✅",c:"#16a34a"},"réglée":{e:"💸",c:"#7c3aed"}};
const CODES_FIXES=["FG2026 - Fonctionnement National","FV2026 - Fonctionnement Sud","FP2026 - Fonctionnement IDF","RH2026 - Ressources humaines"];
let CODES=JSON.parse(localStorage.getItem("litup_codes_dir")||"null")||CODES_FIXES;
const EXPENSE_TYPES=[
  {l:"Fournitures pédagogiques",c:"60630000 - Fournitures entretien et petit outillage"},
  {l:"Fournitures administratives",c:"60640000 - Fournitures administratives"},
  {l:"Maintenance informatique",c:"61560000 - Maintenance"},
  {l:"Documentation",c:"61810000 - Documentation"},
  {l:"Voyages et déplacements",c:"62510000 - Voyages et déplacements"},
  {l:"Missions (séjours, séminaires)",c:"62560000 - Missions / Séjours / Séminaires"},
  {l:"Alimentation",c:"62570000 - Réceptions"},
  {l:"Autre",c:"_autre"},{l:"Je ne sais pas",c:"_inconnu"}];
function expTypeOptions(current){return'<option value="">—</option>'+EXPENSE_TYPES.map(t=>`<option value="${t.c}"${t.c===current?" selected":""}>${t.l}</option>`).join("")}
function mergeCodes(nc){return[...new Set([...CODES_FIXES,...nc])]}
async function loadCodesFromSheet(){
  try{
    const res=await sheetAPI("getConfig",null,{key:"codes_projets"});
    if(res.value){
      let nc;
      try{nc=JSON.parse(res.value)}catch(e){
        nc=res.value.split(",").map(s=>s.trim()).filter(Boolean);
      }
      if(nc&&nc.length){CODES=mergeCodes(nc);localStorage.setItem("litup_codes_dir",JSON.stringify(CODES));console.log("Codes loaded: "+CODES.length)}
    }
  }catch(e){console.warn("Load codes error:",e)}
}
function codeOptions(current){
  const autres=[...CODES].filter(c=>!CODES_FIXES.includes(c)).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
  return'<option value="">—</option><option value="_inconnu">?</option>'+
    '<optgroup label="Transversal">'+CODES_FIXES.map(c=>`<option${c===current?" selected":""}>${c}</option>`).join("")+'</optgroup>'+
    '<optgroup label="Parcours">'+autres.map(c=>`<option${c===current?" selected":""}>${c}</option>`).join("")+'</optgroup>'
}
let D=JSON.parse(localStorage.getItem("litup_dir")||"null")||{ndfs:[]};
function save(){try{localStorage.setItem("litup_dir",JSON.stringify(D))}catch(e){} syncToSheet()}
function closeM(){$("modalC").innerHTML=""}

// ─── GOOGLE SHEET BACKEND ───
const BACKEND_URL="https://script.google.com/macros/s/AKfycbytfkNPD3wM5VKxlU3xLSe393y4mR3AYVz2C8G-mj3wOMb99cC83tMcXuC7yZWiawSpGw/exec";
async function sheetAPI(action,data,params){
  try{
    let url=BACKEND_URL+"?action="+action;
    if(params)Object.keys(params).forEach(k=>url+="&"+k+"="+encodeURIComponent(params[k]));
    if(!data){const r=await fetch(url,{redirect:"follow"});return await r.json()}
    const r=await fetch(url,{method:"POST",redirect:"manual",headers:{"Content-Type":"text/plain"},body:JSON.stringify(data)});
    if(r.type==="opaqueredirect"||r.status===302||r.status===0){return{ok:true}}
    return await r.json();
  }catch(e){console.warn("Sheet API error:",e);return{error:e.message}}
}
function setSyncStatus(s){const el=document.getElementById("syncStatus");if(el)el.textContent=s}
async function syncToSheet(){
  if(!D.director)return;setSyncStatus("🔄");
  try{
    const updates=D.ndfs.map(n=>({ref:n.ref,salarie:n.salarie||n.source,status:n.status,statusDate:n.statusDate||"",paymentDate:n.paymentDate||""}));
    const res=await sheetAPI("updateStatus",{updates,director:D.director});
    setSyncStatus(res.error?"⚠️":"☁️");
  }catch(e){console.warn("Dir sync error:",e);setSyncStatus("⚠️")}
}
async function loadFromSheet(){
  setSyncStatus("🔄");
  try{
    const res=await sheetAPI("getAllNDF");
    if(res.error){setSyncStatus("⚠️");return}
    if(res.ndfs&&res.ndfs.length){
      let added=0;
      res.ndfs.forEach(sn=>{
        const ex=D.ndfs.find(n=>n.ref===sn.ref);
        if(!ex){
          D.ndfs.push({ref:sn.ref,salarie:sn.salarie,source:sn.salarie,date:sn.date,status:sn.status||"envoyée",
            statusDate:sn.statusDate,paymentDate:sn.paymentDate,lines:sn.lines||[],isPresta:sn.isPresta==="TRUE",coordo:sn.coordo||""});
          added++;
        } else {
          // Always update lines from Sheet (source of truth after resync)
          if(sn.lines&&sn.lines.length)ex.lines=sn.lines;
          if(sn.status)ex.status=sn.status;
          if(sn.statusDate)ex.statusDate=sn.statusDate;
          if(sn.paymentDate)ex.paymentDate=sn.paymentDate;
          if(sn.coordo)ex.coordo=sn.coordo;
        }
      });
      save();render();
      if(added)console.log("Loaded "+added+" NDF from Sheet");
    }
    setSyncStatus("☁️");
  }catch(e){console.warn("Load from sheet error:",e);setSyncStatus("⚠️")}
}

// Director profile
function initDirector(){
  if(D.director)return;
  $("modalC").innerHTML=`<div class="modal-bg"><div class="modal" style="max-width:400px">
    <h3>👋 Bienvenue</h3><p style="font-size:12px;color:var(--text-2);margin-bottom:14px">Sélectionnez votre profil direction.</p>
    <div class="form-row" style="margin-bottom:12px"><label>Votre nom</label>
      <select class="inp" id="initDir"><option value="">— Choisir —</option><option>Laetitia DE BORDE</option><option>Clémentine CLAUDON</option></select></div>
    <button class="b b-p" onclick="const v=$('initDir').value;if(!v){alert('Choisissez un nom');return}D.director=v;save();closeM();render()">Commencer</button>
  </div></div>`;
}

let sortCol="date",sortDir=-1,filtStatus="",filtSalarie="";

function toggleStatusFilter(s){
  if(filtStatus===s)filtStatus="";else filtStatus=s;
  render();
}
function setSort(col){
  if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=col==="montant"||col==="date"?-1:1}
  render();
}

async function majCodes(){
  const btn=document.getElementById("btnMaj"),st=document.getElementById("majStatus");
  btn.disabled=true;btn.textContent="⏳";st.textContent="synchro…";st.style.color="#d97706";
  try{
    await fetch("https://hook.eu2.make.com/77whyzt8n4vaw1wlxc63oad79579g59u",{method:"POST",mode:"no-cors"});
    st.textContent="Airtable → Sheet…";
    await new Promise(r=>setTimeout(r,10000));
    st.textContent="chargement…";
    await loadCodesFromSheet();
    st.textContent="✅ "+CODES.length+" codes";st.style.color="#16a34a";
    setTimeout(()=>{st.textContent=""},5000);
  }catch(e){st.textContent="❌ erreur";st.style.color="#ef4444"}
  btn.disabled=false;btn.textContent="🔄";
}

function render(){
  let ndfs=[...D.ndfs];
  // Filters
  if(filtStatus){
    if(filtStatus==="envoyée")ndfs=ndfs.filter(n=>n.status==="envoyée");
    else ndfs=ndfs.filter(n=>n.status===filtStatus);
  }
  if(filtSalarie)ndfs=ndfs.filter(n=>(n.source||n.salarie||"")=== filtSalarie);
  // Stats (on all data, not filtered)
  const allNdfs=D.ndfs;const byS={};STATUTS.forEach(s=>byS[s]=0);allNdfs.forEach(n=>byS[n.status]=(byS[n.status]||0)+1);
  const tot=allNdfs.reduce((s,n)=>s+n.lines.reduce((s2,l)=>s2+(l.amount||0),0),0);
  const aValider=(byS["envoyée"]||0);
  // Director info
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div><strong style="font-size:15px">${D.director||"Direction"}</strong> <span style="color:var(--text-3);font-size:11px">· ${allNdfs.length} NDF</span></div>
    <button class="b b-d" style="font-size:10px" onclick="D.director='';save();location.reload()">⚙️ Profil</button>
  </div>`;
  // Stat cards (clickable for filter)
  const cardStyle=(active)=>`cursor:pointer;transition:.2s;${active?"box-shadow:0 0 0 3px var(--accent);transform:scale(1.03)":""}`;
  h+=`<div class="stat-row">
    <div class="stat-card"><div class="stat-v">${allNdfs.length}</div><div class="stat-l">NDF totales</div></div>
    <div class="stat-card"><div class="stat-v" style="color:var(--red)">${fmt(tot)}</div><div class="stat-l">Montant total</div></div>
    <div class="stat-card" style="${cardStyle(filtStatus==="envoyée")}" onclick="toggleStatusFilter('envoyée')"><div class="stat-v" style="color:var(--amber)">${aValider}</div><div class="stat-l">Envoyées${filtStatus==="envoyée"?" ✕":""}</div></div>
    <div class="stat-card" style="${cardStyle(filtStatus==="validée")}" onclick="toggleStatusFilter('validée')"><div class="stat-v" style="color:var(--green)">${byS["validée"]||0}</div><div class="stat-l">Validées${filtStatus==="validée"?" ✕":""}</div></div>
    <div class="stat-card" style="${cardStyle(filtStatus==="réglée")}" onclick="toggleStatusFilter('réglée')"><div class="stat-v" style="color:var(--violet)">${byS["réglée"]||0}</div><div class="stat-l">Réglées${filtStatus==="réglée"?" ✕":""}</div></div>
  </div>`;
  // Filter bar
  const salaries=[...new Set(allNdfs.map(n=>n.source||n.salarie||"?"))].sort();
  h+=`<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
    <select class="inp" style="width:auto;min-width:180px;font-size:12px;padding:6px 10px" onchange="filtSalarie=this.value;render()">
      <option value="">👤 Tous les salariés</option>
      ${salaries.map(s=>`<option${s===filtSalarie?" selected":""}>${s}</option>`).join("")}
    </select>
    <select class="inp" style="width:auto;min-width:150px;font-size:12px;padding:6px 10px" onchange="filtStatus=this.value;render()">
      <option value="">📋 Tous les statuts</option>
      ${STATUTS.map(s=>`<option value="${s}"${s===filtStatus?" selected":""}>${(STY[s]||{}).e||""} ${s}</option>`).join("")}
    </select>
    ${filtStatus||filtSalarie?`<button class="b b-d" style="font-size:11px;padding:4px 10px" onclick="filtStatus='';filtSalarie='';render()">✕ Réinitialiser</button>`:""}
    <span style="font-size:11px;color:var(--text-3);margin-left:auto">${ndfs.length}/${allNdfs.length} NDF affichées</span>
  </div>`;

  if(!ndfs.length){h+=`<div class="empty"><h3>${allNdfs.length?"Aucune NDF ne correspond au filtre":"Aucune NDF"}</h3><p>${allNdfs.length?"Modifiez les filtres ci-dessus":"Importez les exports JSON des salariés via 📂"}</p></div>`}
  else{
    const arrow=c=>sortCol===c?(sortDir>0?" ▲":" ▼"):"";
    h+=`<div style="overflow-x:auto"><table><thead><tr>
      <th style="cursor:pointer" onclick="setSort('source')">Salarié${arrow("source")}</th>
      <th style="cursor:pointer" onclick="setSort('benef')">Bénéficiaire${arrow("benef")}</th>
      <th style="cursor:pointer" onclick="setSort('ref')">N° NDF${arrow("ref")}</th>
      <th style="cursor:pointer" onclick="setSort('date')">Date${arrow("date")}</th>
      <th>Lignes</th>
      <th style="text-align:right;cursor:pointer" onclick="setSort('montant')">Montant${arrow("montant")}</th>
      <th>Justif.</th><th>Statut</th><th>Date règlement</th><th></th>
    </tr></thead><tbody>`;
    // Sort
    const sorted=[...ndfs].map(n=>({n,source:n.source||"",benef:n.isPresta?(n.salarie||""):(n.source||""),montant:n.lines.reduce((s,l)=>s+(l.amount||0),0)}));
    sorted.sort((a,b)=>{
      let v=0;
      if(sortCol==="source")v=a.source.localeCompare(b.source);
      else if(sortCol==="benef")v=a.benef.localeCompare(b.benef);
      else if(sortCol==="ref")v=(a.n.ref||"").localeCompare(b.n.ref||"");
      else if(sortCol==="date")v=(a.n.date||"").localeCompare(b.n.date||"");
      else if(sortCol==="montant")v=a.montant-b.montant;
      return v*sortDir;
    });
    sorted.forEach(({n,montant})=>{
      const ni=D.ndfs.indexOf(n);const fc=n.lines.filter(l=>l.fileData||l.fileName).length;
      const benef=n.isPresta?(n.salarie||"Prestataire"):(n.source||"?");const st=STY[n.status]||STY.brouillon;
      h+=`<tr>
        <td style="font-weight:600;font-size:11px">${n.source||"?"}</td>
        <td style="font-size:11px">${benef}${n.isPresta?' <span style="font-size:9px;padding:1px 6px;border-radius:8px;background:var(--amber-bg);color:var(--amber);font-weight:600">presta</span>':""}</td>
        <td style="font-family:var(--mono);font-size:11px">${n.ref||"—"}</td>
        <td style="font-size:11px;color:var(--text-2)">${n.date||""}</td>
        <td style="text-align:center">${n.lines.length}</td>
        <td style="text-align:right;font-family:var(--mono);font-weight:600;color:var(--red)">${fmt(montant)}</td>
        <td style="text-align:center">${fc?`📎 ${fc}`:""}</td>
        <td><select class="inp" style="font-size:11px;padding:4px 6px;width:auto;min-width:120px;color:${st.c};font-weight:600;border-color:${st.c}44" onchange="changeStatus(${ni},this.value)">
          ${STATUTS.map(s=>`<option value="${s}" style="color:${(STY[s]||{}).c}"${s===n.status?" selected":""}>${(STY[s]||{}).e||""} ${s}</option>`).join("")}
        </select></td>
        <td style="font-size:11px">${n.status==="réglée"?`<input class="inp" type="date" value="${n.paymentDate||n.statusDate||""}" style="font-size:11px;padding:3px 6px;width:auto" onchange="D.ndfs[${ni}].paymentDate=this.value;save()">`:n.statusDate?`<span style="color:var(--text-3)">${n.statusDate}</span>`:""}</td>
        <td style="white-space:nowrap">
          <button class="b b-p" style="font-size:10px;padding:4px 8px" onclick="viewDetail(${ni})">👁</button>
          <button class="b b-r" style="font-size:10px;padding:4px 6px" onclick="if(confirm('Supprimer cette NDF ?')){D.ndfs.splice(${ni},1);save();render()}">🗑</button>
        </td></tr>`;
    });
    h+=`</tbody></table></div>`;
  }
  $("main").innerHTML=h;
  const dl=$("dirLabel");if(dl&&D.director)dl.textContent="👤 "+D.director;
}

function viewDetail(ni){
  const n=D.ndfs[ni];if(!n)return;const total=n.lines.reduce((s,l)=>s+(l.amount||0),0);const st=STY[n.status]||STY.brouillon;
  let h=`<div class="modal-bg" onclick="if(event.target===this)closeM()"><div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h3 style="margin:0">👁 ${n.ref} — ${n.salarie||n.source||"?"}${n.isPresta?' <span style="font-size:11px;color:var(--amber)">presta</span>':""}</h3>
      <select class="inp" style="font-size:11px;width:auto;min-width:130px;color:${st.c};font-weight:600" onchange="changeStatusDetail(${ni},this.value)">
        ${STATUTS.map(s=>`<option value="${s}" style="color:${(STY[s]||{}).c}"${s===n.status?" selected":""}>${(STY[s]||{}).e||""} ${s}</option>`).join("")}
      </select>
    </div>
    <div class="stat-row" style="margin-bottom:12px">
      <div class="stat-card"><div class="stat-v" style="color:var(--text-1)">${n.date||"—"}</div><div class="stat-l">Date</div></div>
      <div class="stat-card"><div class="stat-v" style="color:var(--red)">${fmt(total)}</div><div class="stat-l">Total</div></div>
      <div class="stat-card"><div class="stat-v">${n.lines.length}</div><div class="stat-l">Lignes</div></div>
      <div class="stat-card"><div class="stat-v">${n.lines.filter(l=>l.fileData||l.fileName).length}</div><div class="stat-l">Justificatifs</div></div>
    </div>`;
  if(n.prestaComment)h+=`<div style="padding:8px 12px;background:var(--amber-bg);border-radius:8px;font-size:11px;color:var(--amber);margin-bottom:12px">💬 ${n.prestaComment}</div>`;
  h+=`<div style="overflow-x:auto"><table><thead><tr><th>#</th><th>Type</th><th>Date</th><th>Description</th><th>Fournisseur</th><th style="text-align:right">Montant</th><th>Type dépense</th><th>Code projet</th><th>Justificatif</th></tr></thead><tbody>`;
  n.lines.forEach((l,i)=>{const ik=l.type==="ik";
    h+=`<tr${ik?' style="background:var(--amber-bg)"':""}>
      <td style="font-family:var(--mono);font-size:10px;color:var(--text-3)">${i+1}</td>
      <td style="font-size:10px">${ik?"🚗":"📝"}</td>
      <td style="font-size:11px;color:var(--text-2)">${l.date||""}</td>
      <td style="font-size:11px">${l.desc||"—"}${ik?` <span style="color:var(--text-3);font-size:10px">(${l.km||0} km, ${l.cv||5} CV)</span>`:""}</td>
      <td style="font-size:11px;color:var(--text-2)">${l.four||""}</td>
      <td style="text-align:right;font-family:var(--mono);font-weight:600;color:var(--red);font-size:11px">${fmt(l.amount)}</td>
      <td style="font-size:10px;max-width:140px"><select class="inp" style="font-size:10px;padding:2px 4px;min-width:100px" onchange="D.ndfs[${ni}].lines[${i}].expType=this.value;save()">${expTypeOptions(l.expType)}</select></td>
      <td style="font-size:10px;max-width:140px"><select class="inp" style="font-size:10px;padding:2px 4px;min-width:120px" onchange="D.ndfs[${ni}].lines[${i}].code=this.value;save()">${codeOptions(l.code)}</select></td>
      <td style="font-size:10px">`;
    if(l.driveUrl)h+=`<a href="${l.driveUrl}" target="_blank" style="color:var(--accent);text-decoration:underline">📎 ${l.fileName||"Voir"}</a> `;
    else if(l.fileData){if((l.fileType||"").startsWith("image/"))h+=`<a href="#" onclick="event.preventDefault();showImg('${(l.fileName||"").replace(/'/g,"\\'")}','${l.fileData}')" style="color:var(--accent);text-decoration:underline">🖼 ${l.fileName||"image"}</a> `;
    else h+=`<a href="${l.fileData}" download="${l.fileName||"justif"}" style="color:var(--accent)">📄 ${l.fileName||"fichier"}</a> `}
    else if(l.fileName)h+=`<span style="color:var(--text-3)">📄 ${l.fileName}</span> `;
    h+=`<label style="cursor:pointer;font-size:9px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;color:var(--text-3)" title="Ajouter/remplacer le justificatif">📤<input type="file" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="uploadPJ(${ni},${i},this)"></label>`;
    h+=`</td></tr>`;
  });
  h+=`<tr style="border-top:2px solid var(--border);font-weight:700"><td></td><td></td><td></td><td></td><td>TOTAL</td><td style="text-align:right;font-family:var(--mono);color:var(--red)">${fmt(total)}</td><td></td><td></td><td></td></tr></tbody></table></div>`;
  // Admin: edit ref
  h+=`<div style="margin-top:12px;padding:10px 14px;background:var(--card-alt);border-radius:8px;border:1px solid var(--border)">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <label style="font-size:11px;font-weight:600;color:var(--text-3)">Réf :</label>
      <input class="inp" id="editRef_${ni}" value="${n.ref}" style="font-size:11px;width:280px;font-family:var(--mono);padding:4px 8px">
      <button class="b b-p" style="font-size:10px;padding:4px 10px" onclick="updateRef(${ni})">💾 Renommer</button>
      <button class="b b-v" style="font-size:10px;padding:4px 10px" onclick="resyncNDF(${ni})">☁️ Sauvegarder</button>
    </div>
  </div>`;
  h+=`<div style="display:flex;gap:6px;margin-top:16px;justify-content:flex-end"><button class="b b-d" onclick="closeM()">Fermer</button></div></div></div>`;
  $("modalC").innerHTML=h;
}

function showImg(name,dataUrl){const d=document.createElement("div");d.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)this.remove()"><div class="modal" style="max-width:900px;text-align:center"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3 style="margin:0">📎 ${name}</h3><div style="display:flex;gap:6px"><a href="${dataUrl}" download="${name}" class="b b-g" style="text-decoration:none">⬇️</a><button class="b b-d" onclick="this.closest('.modal-bg').remove()">✕</button></div></div><img src="${dataUrl}" style="max-width:100%;max-height:70vh;border-radius:8px;border:1px solid var(--border)"></div></div>`;document.body.appendChild(d.firstElementChild)}

function getNextOfficialNumber(){
  const allNums=D.ndfs.map(n=>{const m=(n.ref||"").match(/^N2026-(\d+)/);return m?parseInt(m[1]):0});
  return Math.max(0,...allNums)+1;
}

function updateRef(ni){
  const n=D.ndfs[ni];if(!n)return;
  const newRef=document.getElementById("editRef_"+ni)?.value?.trim();
  if(!newRef){alert("Réf vide");return}
  if(newRef===n.ref)return;
  const oldRef=n.ref;
  n.ref=newRef;
  save();render();
  alert("Réf modifiée : "+oldRef+" → "+newRef);
}

async function resyncNDF(ni){
  const n=D.ndfs[ni];if(!n)return;
  const btn=event.target;btn.disabled=true;btn.textContent="⏳ Sauvegarde...";
  try{
    const ndfForSheet={...n,lines:n.lines.map(l=>{const c={...l};delete c.fileData;return c})};
    await sheetAPI("saveNDF",{salarie:n.salarie||n.source||"",ndfs:[ndfForSheet],modifiedBy:D.director||"Direction",coordo:n.coordo||""});
    btn.textContent="✅ Sauvegardé !";btn.style.color="var(--green)";
    setTimeout(()=>{btn.textContent="☁️ Sauvegarder";btn.style.color="";btn.disabled=false},2000);
  }catch(e){
    btn.textContent="❌ Erreur";btn.style.color="var(--red)";
    setTimeout(()=>{btn.textContent="☁️ Sauvegarder";btn.style.color="";btn.disabled=false},2000);
  }
}

async function uploadPJ(ni,li,inp){
  if(!inp.files||!inp.files.length)return;
  const n=D.ndfs[ni];if(!n)return;
  const l=n.lines[li];if(!l)return;
  const f=inp.files[0];
  const label=inp.parentElement;
  label.textContent="⏳";
  
  const rd=new FileReader();
  rd.onload=async ev=>{
    const fileData=ev.target.result;
    const ext=f.name.includes(".")?f.name.split(".").pop():"pdf";
    const fournisseur=(l.four||"").toUpperCase().replace(/[^A-Z0-9]/g,"").substring(0,20)||"JUSTIF";
    const nomFichier=n.ref+"_"+String(li+1).padStart(2,"0")+"_"+fournisseur+"."+ext;
    
    try{
      const res=await sheetAPI("uploadJustif",{ndfRef:n.ref,fileName:nomFichier,fileData:fileData});
      if(res.ok){
        l.driveUrl=res.fileUrl||"";
        l.driveFileId=res.fileId||"";
        l.fileName=nomFichier;
        l.fileType=f.type;
        save();
        label.innerHTML='✅';
        setTimeout(()=>viewDetail(ni),1000);
      }else{label.innerHTML='❌'}
    }catch(e){
      console.warn("Upload PJ error:",e);
      label.innerHTML='❌';
    }
  };
  rd.readAsDataURL(f);
}

function changeStatus(ni,newStatus){
  const n=D.ndfs[ni];if(!n)return;
  const oldStatus=n.status;
  
  // If changing to "validée" and ref is not official yet → assign official number
  if(newStatus==="validée"&&!n.ref.match(/^N2026-\d+/)){
    const num=getNextOfficialNumber();
    const nom=(n.salarie||n.source||"X").split(" ").pop().toUpperCase().replace(/[^A-Z]/g,"");
    const dt=(n.date||new Date().toISOString().split("T")[0]).replace(/-/g,"");
    const oldRef=n.ref;
    n.ref="N2026-"+String(num).padStart(3,"0")+"-"+nom+"-"+dt;
    if(!confirm("Valider cette NDF ?\n\nRéférence officielle : "+n.ref+"\n(ancienne réf : "+oldRef+")")){n.ref=oldRef;return}
  }
  
  n.status=newStatus;
  n.statusDate=new Date().toISOString().split("T")[0];
  save();render();
}

function changeStatusDetail(ni,newStatus){
  changeStatus(ni,newStatus);
  if(D.ndfs[ni])viewDetail(ni);
}

function handleImportNDF(inp){
  if(!inp.files||!inp.files.length)return;
  Array.from(inp.files).forEach(f=>{const rd=new FileReader();rd.onload=ev=>{
    try{
      const raw=ev.target.result;
      if(!raw||raw.length<10){alert("⚠️ Fichier vide ou trop petit.");inp.value="";return}
      const d=JSON.parse(raw);
      // Standard export from salarié tool: {salarie, ndfs, cv, exportDate}
      if(d.salarie&&d.ndfs&&Array.isArray(d.ndfs)){
        let added=0,updated=0;
        d.ndfs.forEach(n=>{n.source=d.salarie;const ex=D.ndfs.find(x=>x.ref===n.ref&&x.source===d.salarie);if(ex){Object.assign(ex,n);updated++}else{D.ndfs.push(n);added++}});
        save();render();alert("✅ "+d.ndfs.length+" NDF de "+d.salarie+"\n("+added+" nouvelles, "+updated+" mises à jour)");inp.value="";return}
      // Backup format: {type:"litup-ndf-backup", data:{salarie, ndfs,...}}
      if(d.type==="litup-ndf-backup"&&d.data){
        const ndfs=d.data.ndfs||[];
        if(!ndfs.length){alert("⚠️ Sauvegarde vide (0 NDF).");inp.value="";return}
        const s=d.data.salarie||d.salarie||"Inconnu";
        let added=0,updated=0;
        ndfs.forEach(n=>{n.source=s;const ex=D.ndfs.find(x=>x.ref===n.ref&&x.source===s);if(ex){Object.assign(ex,n);updated++}else{D.ndfs.push(n);added++}});
        save();render();alert("✅ "+ndfs.length+" NDF importées de "+s+"\n("+added+" nouvelles, "+updated+" mises à jour)");inp.value="";return}
      // Prestataire NDF
      if(d.type==="litup-ndf-prestataire"){alert("⚠️ C'est une NDF prestataire.\nImportez-la dans l'outil salarié d'abord.");inp.value="";return}
      // Retour direction
      if(d.type==="litup-ndf-retour"){alert("⚠️ Ce fichier est un retour direction — il est destiné aux salariés.");inp.value="";return}
      alert("Format non reconnu.\n\nType: "+(d.type||"aucun")+"\nClés: "+Object.keys(d).join(", "));
    }catch(err){alert("❌ Erreur de lecture :\n"+err.message+"\n\nFichier: "+f.name+" ("+f.size+" octets)")}
    inp.value="";
  };rd.readAsText(f)});
}

function exportRetour(){
  const today=new Date();const dateStr=today.getFullYear()+String(today.getMonth()+1).padStart(2,"0")+String(today.getDate()).padStart(2,"0");
  const isoDate=today.toISOString().split("T")[0];
  const dirName=D.director||"Direction";const dirNom=dirName.split(" ").pop().toUpperCase();
  const ret={type:"litup-ndf-retour",date:isoDate,director:dirName,updates:D.ndfs.map(n=>({ref:n.ref,salarie:n.salarie||n.source,status:n.status,statusDate:n.statusDate||isoDate,paymentDate:n.paymentDate||"",statusBy:dirName}))};
  const fn="NDF_retour_"+dirNom+"_"+dateStr+".json";
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(ret,null,2)],{type:"application/json"}));a.download=fn;a.click();
  alert("✅ "+ret.updates.length+" statuts exportés\n📁 "+fn+"\n\nChaque salarié importera ce fichier pour voir les mises à jour.");
}

function exportCompta(){
  const ok=D.ndfs.filter(n=>n.status==="validée"||n.status==="réglée");
  if(!ok.length){alert("Aucune NDF validée/réglée.");return}
  const buf={};ok.forEach(n=>{buf[n.ref]=n.lines.map((l,i)=>({dt:l.date||n.date,desc:l.desc||"",four:l.four||"",deb:l.amount||0,cat:l.expType||"",act:l.code||"",expType:l.expType||"",resp:n.salarie||n.source||"",numj:n.ref+"_"+String(i+1).padStart(2,"0"),ndf:n.ref}))});
  const data={ndfBuffer:buf,exportSource:"litup-ndf-direction",exportDate:new Date().toISOString().split("T")[0]};
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));a.download="NDF_compta_"+data.exportDate+".json";a.click();
  alert("✅ "+Object.keys(buf).length+" NDF exportées pour la compta\n\nImportez dans l'outil V6 via 📥 AT.");
}

initDirector();
if(D.director){render();loadFromSheet();loadCodesFromSheet()}
</script>
