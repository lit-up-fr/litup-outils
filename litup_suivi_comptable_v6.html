<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root{
  --bg-0:#0b0d12;--bg-1:#12151c;--bg-2:#181c26;--bg-3:#1f2433;
  --border:#252d3f;--border-h:#3a4560;
  --text-1:#e8ecf4;--text-2:#a8b4c8;--text-3:#6b7a92;
  --accent:#6366f1;--accent-l:#818cf8;--accent-bg:rgba(99,102,241,.08);
  --green:#34d399;--green-bg:rgba(52,211,153,.08);
  --red:#f87171;--red-bg:rgba(248,113,113,.08);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,.08);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,.08);
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --radius:6px;--shadow:none;
}
html.light{
  --bg-0:#f5f6f8;--bg-1:#ffffff;--bg-2:#ffffff;--bg-3:#f0f2f5;
  --border:#e0e4ec;--border-h:#c8cdd8;
  --text-1:#1a202c;--text-2:#4a5568;--text-3:#8896a8;
  --accent:#5b63e0;--accent-l:#6366f1;--accent-bg:rgba(91,99,224,.06);
  --green:#16a34a;--green-bg:rgba(22,163,74,.06);
  --red:#dc2626;--red-bg:rgba(220,38,38,.06);
  --amber:#d97706;--amber-bg:rgba(217,119,6,.06);
  --blue:#2563eb;--blue-bg:rgba(37,99,235,.06);
  --shadow:0 1px 3px rgba(0,0,0,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:13px}
body{background:var(--bg-0);color:var(--text-1);font-family:var(--sans);line-height:1.55;min-height:100vh}
::-webkit-scrollbar{width:7px;height:7px}::-webkit-scrollbar-track{background:var(--bg-1)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--border-h)}
a{color:var(--accent-l);text-decoration:none}

/* ─── HEADER ─── */
.hd{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--bg-1)}
.logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#5b63e0 0%,#818cf8 100%);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff;flex-shrink:0;box-shadow:0 3px 12px rgba(99,102,241,.3)}
.btn-group{display:flex;gap:4px;padding:3px;background:var(--bg-2);border-radius:8px;border:1px solid var(--border)}
.b{display:inline-flex;align-items:center;gap:4px;padding:6px 11px;border-radius:var(--radius);font-size:11px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;font-family:var(--sans)}.b:hover{transform:translateY(-1px)}
.bg{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,.25)}.bg:hover{background:rgba(52,211,153,.15)}
.by{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(251,191,36,.25)}.by:hover{background:rgba(251,191,36,.15)}
.bb{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(96,165,250,.25)}.bb:hover{background:rgba(96,165,250,.15)}
.bd{background:transparent;color:var(--text-3);border:1px solid var(--border)}.bd:hover{color:var(--text-2);border-color:var(--border-h)}
.br{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.2)}.br:hover{background:rgba(248,113,113,.15)}
.bp{background:var(--accent);color:#fff;border:1px solid var(--accent);box-shadow:0 2px 8px rgba(99,102,241,.25)}.bp:hover{box-shadow:0 4px 12px rgba(99,102,241,.35)}

/* ─── STATS BAR ─── */
.st{padding:10px 20px;display:flex;gap:10px;border-bottom:1px solid var(--border);flex-wrap:wrap;overflow-x:auto;background:var(--bg-0)}
.sc{background:var(--bg-2);padding:8px 14px;border-radius:8px;border:1px solid var(--border);flex-shrink:0}
.sl{font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:2px}.sv{font-size:16px;font-weight:700;color:var(--text-1);font-family:var(--mono)}

/* ─── TAB BAR ─── */
.tb{padding:8px 20px;display:flex;gap:4px;align-items:center;border-bottom:1px solid var(--border);flex-wrap:wrap;overflow-x:auto;background:var(--bg-1)}
.tab{padding:7px 14px;border-radius:var(--radius);border:none;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.2s;font-family:var(--sans)}
.ta{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.2)}.ti{background:var(--bg-2);color:var(--text-3);border:1px solid transparent}.ti:hover{background:var(--bg-3);color:var(--text-2)}
.fb{padding:4px 10px;border-radius:var(--radius);font-size:10px;cursor:pointer;background:transparent;white-space:nowrap;transition:.2s}
.fb.on{border:1px solid var(--accent);background:var(--accent-bg);color:var(--accent-l);font-weight:600}.fb:not(.on){border:1px solid var(--border);color:var(--text-3)}
.si{background:var(--bg-2);color:var(--text-1);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;font-size:11px;width:170px;outline:none;font-family:var(--sans);transition:border .2s}.si:focus{border-color:var(--accent)}

/* ─── TABLE ─── */
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg-1);padding:8px 8px;text-align:left;border-bottom:2px solid rgba(99,102,241,.2);color:var(--text-3);font-size:10px;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;position:sticky;top:0;z-index:10;font-weight:600}
td{padding:5px 8px;border-bottom:1px solid rgba(37,45,63,.4);vertical-align:middle}
tr:hover{background:rgba(99,102,241,.03)}
tr.ndf{background:rgba(251,191,36,.04)}
tr.ndf-split{background:rgba(99,102,241,.04);border-left:3px solid rgba(99,102,241,.3)}
.ci{background:transparent;color:var(--text-1);border:none;font-size:12px;width:100%;padding:2px 0;outline:none;font-family:var(--sans)}
.cj{background:transparent;color:var(--text-1);border:1px solid var(--border);border-radius:4px;font-size:11px;width:100%;padding:3px 5px;outline:none;font-family:var(--sans);transition:border .2s}.cj:focus{border-color:var(--accent)}
.ms{background:var(--bg-2);color:var(--text-1);border:1px solid var(--border);border-radius:4px;padding:3px 5px;font-size:11px;width:100%;outline:none;font-family:var(--sans)}.ms:focus{border-color:var(--accent)}
.yr{background:var(--bg-2);color:var(--text-1);border:1px solid var(--border);border-radius:4px;padding:3px 5px;font-size:11px;width:60px;outline:none;font-family:var(--sans);text-align:center}
.ni{background:var(--bg-0);color:var(--text-1);border:1px solid var(--border);border-radius:4px;font-size:11px;padding:4px 6px;outline:none;font-family:var(--mono);text-align:right;width:95px}

/* ─── SEARCH SELECT ─── */
.ss{position:relative;width:100%}
.ss-d{background:var(--bg-2);border:1px solid var(--border);border-radius:5px;padding:4px 7px;font-size:11px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;min-height:24px;line-height:16px;color:var(--text-1);transition:border .2s}.ss-d:hover{border-color:var(--accent)}
.ss-d.em{color:var(--text-3)}
.ss-dd{position:absolute;top:100%;left:0;right:0;z-index:999;background:var(--bg-2);border:1px solid var(--border);border-radius:6px;max-height:220px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.6);display:flex;flex-direction:column}
.ss-s{width:100%;padding:6px 10px;font-size:11px;background:var(--bg-1);color:var(--text-1);border:none;border-bottom:1px solid var(--border);outline:none;font-family:var(--sans)}
.ss-i{padding:5px 10px;font-size:11px;cursor:pointer;transition:.1s}.ss-i:hover{background:var(--accent-bg)}.ss-i.sel{background:rgba(99,102,241,.12);color:var(--accent-l)}
.ib{background:none;border:none;cursor:pointer;padding:3px;color:var(--text-3);font-size:13px;transition:.2s;border-radius:4px}.ib:hover{color:var(--text-1);background:var(--bg-3)}
.deb{text-align:right;color:var(--red);font-weight:600;white-space:nowrap;font-family:var(--mono);font-size:11px}
.cre{text-align:right;color:var(--green);font-weight:600;white-space:nowrap;font-family:var(--mono);font-size:11px}
.att{display:inline-flex;align-items:center;gap:3px;padding:3px 6px;border-radius:5px;font-size:10px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-3);text-decoration:none;transition:.2s}
.att.has{background:var(--accent-bg);border-color:rgba(99,102,241,.3);color:var(--accent-l)}
.empty{text-align:center;padding:60px 24px;color:var(--text-3)}.empty h3{font-size:16px;font-weight:600;margin:12px 0 8px;color:var(--text-2)}

/* ─── CARDS & GRIDS ─── */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;padding:16px 20px}
.scard{background:var(--bg-2);border-radius:10px;padding:14px;border:1px solid var(--border);transition:border .2s;box-shadow:var(--shadow)}.scard:hover{border-color:var(--border-h)}
.sbar{height:5px;background:var(--bg-0);border-radius:3px;overflow:hidden;margin-top:8px}.sbar-f{height:100%;border-radius:3px;transition:width .5s}
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;background:var(--accent-bg);border:1px solid rgba(99,102,241,.2);border-radius:12px;font-size:10px;color:var(--accent-l);cursor:pointer;transition:.2s}.chip:hover{background:rgba(99,102,241,.15)}
.chip .x{opacity:.5;margin-left:2px}.chip .x:hover{opacity:1}

/* ─── MODALS ─── */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.modal{background:var(--bg-2);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:800px;width:95%;max-height:85vh;overflow:auto;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.modal h3{font-size:15px;margin-bottom:14px;color:var(--text-1);font-weight:700}
.cfg-row{display:flex;gap:5px;align-items:center;padding:6px 0;border-bottom:1px solid rgba(37,45,63,.3);flex-wrap:wrap}
.cfg-row input,.cfg-row select{padding:5px 7px;background:var(--bg-0);border:1px solid var(--border);border-radius:5px;color:var(--text-1);font-size:11px;font-family:var(--sans);outline:none}
.warn{background:var(--amber-bg);border:1px solid rgba(251,191,36,.15);border-radius:8px;padding:12px;margin:8px 0}

/* ─── ALERTS & PROGRESS ─── */
.alert-ok{color:var(--green)}.alert-warn{color:var(--amber)}.alert-danger{color:var(--red)}
.pbar{height:20px;background:var(--bg-3);border-radius:5px;overflow:hidden;position:relative}
.pbar-f{height:100%;border-radius:5px;transition:width .4s ease}
.pbar-t{position:absolute;top:0;left:8px;line-height:20px;font-size:10px;font-weight:600;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5)}

/* ─── DASHBOARD ─── */
.dash{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;padding:16px 20px;border-bottom:1px solid var(--border)}
.dash-c{background:var(--bg-2);padding:14px;border-radius:10px;border:1px solid var(--border);text-align:center;transition:.2s}.dash-c:hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.dash-v{font-size:24px;font-weight:800;font-family:var(--mono)}.dash-l{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;font-weight:500}
.mo-check{width:16px;height:16px;cursor:pointer;accent-color:var(--accent)}
.ndf-split{background:rgba(99,102,241,.04);border-left:3px solid rgba(99,102,241,.3)}
</style>
</head>

// Smart libellé parsing
function parseFacilitateur(lib){
  // "VIR FACILIT - BU58 - DIAB" → {four:"DIAB", codeProjet:"BU58"}
  const u=lib.toUpperCase();
  if(!u.includes("FACILIT"))return null;
  const parts=lib.split("-").map(s=>s.trim());
  if(parts.length>=3)return{four:parts[parts.length-1],codeBU:parts[parts.length-2].trim()};
  if(parts.length===2)return{four:parts[1],codeBU:""};
  return null;
}
function parseNDF(lib){
  // "VIR N2025-034 - DIAB" → {ndfRef:"N2025-034", four:"DIAB"}
  const m=lib.match(/N20\d{2}-\d{2,4}/);
  if(!m)return null;
  const parts=lib.split("-").map(s=>s.trim());
  const four=parts.length>=3?parts[parts.length-1]:"";
  return{ndfRef:m[0],four};
}

function applyRulesToUnaffected(){
  pushUndo();
  let count=0;
  D.rows.forEach(r=>{
    if(r.cat&&r.act)return;// Already classified, skip
    const rl=applyRules(r.lib);
    if(rl){
      if(!r.cat&&rl.cat)r.cat=rl.cat;
      if(!r.act&&rl.act)r.act=rl.act;
      if(!r.four&&rl.four)r.four=rl.four;
      count++;
    }
    // Smart parsing for facilitateurs
    if(!r.four){

      if(fac){r.four=fac.four;if(!r.cat)r.cat="62142000 - Intervenants pédagogiques"}

    if(!r.four){

      if(ndf&&ndf.four)r.four=ndf.four;
    }
  });

}

function createActFromNdf(idx,rawCode){
  const cpCode=rawCode.split(" ")[0].trim();

  if(!label)return;

  D.acts.push({l:label,t:terr});
  autoSave();

  const sel=$("ndfcode_"+idx);if(sel){
    const opt=document.createElement("option");opt.value=label;opt.textContent=label;opt.selected=true;
    sel.appendChild(opt)}
  alert("Code projet créé : "+label+" ("+terr+")");

function applyNdfCodeResolution(unmatchedList){
  const mapping={};
  unmatchedList.forEach((code,i)=>{
    const sel=$("ndfcode_"+i);
    if(sel&&sel.value)mapping[code]=sel.value;
  });
  // Apply mapping to all ndfBuffer entries
  let resolved=0;
  Object.values(D.ndfBuffer).forEach(lines=>{
    lines.forEach(line=>{
      if(line.act&&!line.actMatched&&mapping[line.act]){
        line.act=mapping[line.act];line.actMatched=true;resolved++}
    });
  });
  autoSave();closeM();
  if(resolved>0)alert(resolved+" ligne(s) mises à jour avec les nouveaux codes.");
  else alert("Aucune modification (codes ignorés ou déjà résolus).");
}

// ─── EXPORT FEC (Fichier des Écritures Comptables) ───
function exportFEC(){
  // FEC format: tab-separated, ISO 8859-15 compatible, mandatory columns
  const SIRET="90304598700018";const SIREN="903045987";
  const raison="ASSOCIATION LIT UP";
  const cloture="20261231";
  // Headers FEC normé (article A.47 A-1 du LPF)
  const fecHeaders=["JournalCode","JournalLib","EcritureNum","EcritureDate","CompteNum","CompteLib","CompAuxNum","CompAuxLib","PieceRef","PieceDate","EcritureLib","Debit","Credit","EcritureLet","DateLet","ValidDate","Montantdevise","Idevise"];
  const lines=[fecHeaders.join("\t")];
  let ecNum=0;
  D.rows.filter(r=>r.cat&&r.yr==="2026").sort((a,b)=>(a.dt||"").localeCompare(b.dt||"")).forEach(r=>{
    ecNum++;
    const ecId=String(ecNum).padStart(6,"0");
    const dt=(r.dt||"").replace(/-/g,"");
    const cat=r.cat?r.cat.substring(0,8).replace(/\s.*/,""):""; // code comptable sans libellé
    const catLib=r.cat||"";
    const journal=r.src==="ndf-split"?"NDF":(r.cre?"BQ":"BQ");
    const journalLib=journal==="NDF"?"Notes de frais":"Banque";
    const debit=r.deb?String(r.deb).replace(".",","):"0,00";
    const credit=r.cre?String(r.cre).replace(".",","):"0,00";
    const pieceRef=r.numj||r.ndf||ecId;
    const lib=(r.lib||"").substring(0,200).replace(/\t/g," ");
    // Ligne d'écriture
    lines.push([journal,journalLib,ecId,dt,cat,catLib,"","",pieceRef,dt,lib,debit,credit,"","",dt,"",""].join("\t"));
    // Contrepartie (512 = banque)
    lines.push([journal,journalLib,ecId,dt,"512000","Banque","","",pieceRef,dt,lib,credit,debit,"","",dt,"",""].join("\t"));
  });

function getAlerts(){
  const alerts=[];
  const vIdx=D.budgetVersions.length-1;
  const now=new Date();const elapsed=(now.getMonth()+1)/12;
  // NDF en attente dans le buffer
  const ndfCount=Object.keys(D.ndfBuffer||{}).length;
  if(ndfCount)alerts.push({type:"warn",icon:"✂️",text:ndfCount+" NDF importée(s) non éclatée(s) — cliquez ✂️ sur les virements correspondants"});
  // Justificatifs manquants
  const missing=D.rows.filter(r=>r.stat==="Justificatif manquant"&&r.cat).length;
  if(missing)alerts.push({type:"warn",icon:"📎",text:missing+" justificatif(s) manquant(s)"});
  // Lignes non classées
  const unclassed=D.rows.filter(r=>!r.cat).length;
  if(unclassed)alerts.push({type:"info",icon:"📋",text:unclassed+" ligne(s) non classée(s)"});
  // Budget alerts
  const realized={};
  D.rows.filter(r=>r.yr==="2026"&&r.cat).forEach(r=>{
    if(!realized[r.cat])realized[r.cat]={deb:0,cre:0};
    realized[r.cat].deb+=(r.deb||0);realized[r.cat].cre+=(r.cre||0);
  });
  D.budget.forEach(b=>{
    const annual=b.versions?.[vIdx]||0;if(!annual)return;
    const real=realized[b.cat];
    const realVal=b.type==="charge"?(real?.deb||0):(real?.cre||0);
    const pct=annual>0?(realVal/annual):0;
    if(b.type==="charge"&&pct>1)alerts.push({type:"danger",icon:"🔴",text:b.cat.substring(0,20)+" dépasse le budget de "+Math.round((pct-1)*100)+"%"});

  });
  return alerts;
}

// ─── AUTO-MATCH BANK ↔ NDF ───
function autoMatchNDF(){
  if(!D.ndfBuffer||!Object.keys(D.ndfBuffer).length){alert("Aucune NDF dans le buffer à rapprocher.\nImportez d'abord un fichier NDF via 📥 NDF.");return}
  const matches=[];
  D.rows.filter(r=>r.src==="banque"&&parseNDF(r.lib)).forEach(bankRow=>{
    const m=bankRow.lib.match(/N20\d{2}-\d{2,4}/);if(!m)return;
    const ndfRef=m[0];
    const bufLines=(D.ndfBuffer||{})[ndfRef];if(!bufLines)return;
    const bankAmt=bankRow.deb||0;
    const ndfTotal=bufLines.reduce((s,l)=>s+(l.deb||0),0);
    matches.push({bankId:bankRow.id,ndfRef,bankAmt,ndfTotal,lines:bufLines.length,match:Math.abs(bankAmt-ndfTotal)<0.02});
  });
  if(!matches.length){alert("Aucun rapprochement trouvé entre les virements bancaires et les NDF importées.");return}
  // Show modal
  let h=`<div class="modal-bg" onclick="if(event.target===this)closeM()"><div class="modal" style="max-width:700px">
    <h3>🔗 Rapprochement automatique banque ↔ NDF</h3>

    <table><thead><tr><th style="width:30px">✓</th><th>Réf NDF</th><th style="text-align:right">Virement banque</th><th style="text-align:right">Total NDF</th><th>Lignes</th><th>Écart</th></tr></thead><tbody>`;
  matches.forEach((m,i)=>{
    const ecart=Math.abs(m.bankAmt-m.ndfTotal);
    const ok=ecart<0.02;
    h+=`<tr><td><input type="checkbox" class="mo-check" id="am_${i}"${ok?" checked":""}></td>
      <td style="font-family:var(--mono);font-size:11px">${m.ndfRef}</td>
      <td style="text-align:right;font-family:var(--mono)">${fmt(m.bankAmt)}</td>
      <td style="text-align:right;font-family:var(--mono)">${fmt(m.ndfTotal)}</td>
      <td style="text-align:center">${m.lines}</td>
      <td style="font-family:var(--mono);color:${ok?"var(--green)":"var(--red)"}">${ok?"✅ OK":"⚠️ "+fmt(ecart)}</td></tr>`;
  });
  h+=`</tbody></table>
    <div style="display:flex;gap:6px;margin-top:14px;justify-content:flex-end">
      <button class="b bd" onclick="closeM()">Annuler</button>
      <button class="b bp" onclick="execAutoMatch(${JSON.stringify(matches.map(m=>({bankId:m.bankId,ndfRef:m.ndfRef}))).replace(/"/g,'&quot;')})">✂️ Éclater les cochés</button>
    </div></div></div>`;
  $("modalC").innerHTML=h;
}

function execAutoMatch(matchList){
  let done=0;
  matchList.forEach((m,i)=>{
    if(!$("am_"+i)?.checked)return;
    // Reuse splitNDF logic inline
    const bankRow=D.rows.find(r=>r.id===m.bankId);if(!bankRow)return;
    const ndfLines=(D.ndfBuffer||{})[m.ndfRef];if(!ndfLines)return;
    const nameParts=bankRow.lib.split("-");
    let salName="";if(nameParts.length>=2){let raw=nameParts[nameParts.length-1].trim();raw=raw.replace(/^(VIR|FACILIT)\s*/i,"").trim();if(raw.length>1)salName=raw}
    const bankIdx=D.rows.findIndex(r=>r.id===m.bankId);
    D.rows.splice(bankIdx,1);
    D.rows=D.rows.filter(r=>!(r.src==="ndf"&&r.ndf===m.ndfRef));
    ndfLines.forEach((nr,j)=>{
      const parts=["NDF "+m.ndfRef];if(salName)parts.push(salName);if(nr.desc)parts.push(nr.desc);
      D.rows.splice(bankIdx+j,0,{
        id:"am"+Date.now()+"_"+j,dt:bankRow.dt,yr:bankRow.yr,lib:parts.join(" - "),
        four:nr.four||"",cat:nr.cat||"",act:nr.act||"",deb:nr.deb,cre:null,
        modal:"Virement émis",stat:"Justificatif manquant",resp:nr.resp||"",
        numj:m.ndfRef+"_"+String(j+1).padStart(2,"0"),ndf:m.ndfRef,src:"ndf-split"
      });
    });
    delete D.ndfBuffer[m.ndfRef];done++;
  });
  autoSave();closeM();render();
  alert(done+" NDF éclatée(s) automatiquement.");
}

// ─── UNDO HISTORY ───
let undoStack=[];const MAX_UNDO=30;
function pushUndo(){
  undoStack.push(JSON.stringify({rows:D.rows,att_keys:Object.keys(D.att),budget:D.budget,budgetVersions:D.budgetVersions,soldeInitial:D.soldeInitial,soldeDate:D.soldeDate}));
  if(undoStack.length>MAX_UNDO)undoStack.shift();
}
function undo(){
  if(!undoStack.length){alert("Rien à annuler");return}
  const prev=JSON.parse(undoStack.pop());
  D.rows=prev.rows;D.budget=prev.budget||D.budget;D.budgetVersions=prev.budgetVersions||D.budgetVersions;
  D.soldeInitial=prev.soldeInitial??D.soldeInitial;D.soldeDate=prev.soldeDate||D.soldeDate;
  // Keep attachments that still have matching rows, remove orphaned
  const validKeys=new Set(prev.att_keys||[]);
  for(const k of Object.keys(D.att)){if(!validKeys.has(k))delete D.att[k]}
  autoSave();render();
}

// ─── NDF SPLIT: replace bank NDF line with sub-lines from NDF import ───
function splitNDF(bankId){
  const bankRow=D.rows.find(r=>r.id===bankId);if(!bankRow)return;
  const m=bankRow.lib.match(/N20\d{2}-\d{2,4}/);
  if(!m){alert("Pas de référence NDF trouvée dans le libellé.\nFormat attendu: VIR N2026-XXX - NOM");return}
  const ndfRef=m[0];
  // Extract salarié name from bank libellé: "VIR N2026-001 - QUIBOIS" → "QUIBOIS"
  const nameParts=bankRow.lib.split("-");
  let salName="";
  if(nameParts.length>=2){let raw=nameParts[nameParts.length-1].trim();
    raw=raw.replace(/^(VIR|FACILIT)\s*/i,"").trim();
    if(raw.length>1)salName=raw}
  // Look in ndfBuffer first, then fallback to D.rows
  const bufferLines=(D.ndfBuffer||{})[ndfRef]||[];
  const rowLines=D.rows.filter(r=>r.src==="ndf"&&r.ndf===ndfRef);
  const ndfLines=bufferLines.length?bufferLines:rowLines;
  if(!ndfLines.length){alert("Aucune sous-ligne NDF trouvée pour "+ndfRef+".\n\nImportez d'abord le fichier Notes de frais via 📥 NDF.");return}
  // Check total
  const bankAmt=bankRow.deb||0;
  const ndfTotal=ndfLines.reduce((s,r)=>s+(r.deb||0),0);
  if(Math.abs(bankAmt-ndfTotal)>0.02){
    if(!confirm("⚠️ Écart de montant :\n\nVirement banque : "+fmt(bankAmt)+"\nTotal NDF "+ndfRef+" : "+fmt(ndfTotal)+"\nÉcart : "+fmt(Math.abs(bankAmt-ndfTotal))+"\n\nContinuer quand même ?")){return}
  }
  pushUndo();
  const bankIdx=D.rows.findIndex(r=>r.id===bankId);
  D.rows.splice(bankIdx,1);
  D.rows=D.rows.filter(r=>!(r.src==="ndf"&&r.ndf===ndfRef));
  ndfLines.forEach((nr,i)=>{
    // Libellé: "NDF N2026-001 - QUIBOIS - Kahoot !"
    const desc=nr.desc||"";
    const parts=["NDF "+ndfRef];
    if(salName)parts.push(salName);
    if(desc)parts.push(desc);
    const lib=parts.join(" - ");
    // Justificatif: N2026-001_01, N2026-001_02...
    const numj=ndfRef+"_"+String(i+1).padStart(2,"0");
    D.rows.splice(bankIdx+i,0,{
      id:"ns"+Date.now()+"_"+i,dt:bankRow.dt,yr:bankRow.yr,
      lib,four:nr.four||"",cat:nr.cat||"",act:nr.act||"",
      deb:nr.deb,cre:null,modal:"Virement émis",
      stat:"Justificatif manquant",resp:nr.resp||"",
      numj,ndf:ndfRef,src:"ndf-split"
    });
  });
  if(D.ndfBuffer&&D.ndfBuffer[ndfRef])delete D.ndfBuffer[ndfRef];
  autoSave();render();
  alert("✂️ "+ndfRef+" éclaté en "+ndfLines.length+" sous-ligne(s)\n\n"+
    "Libellé : NDF "+ndfRef+(salName?" - "+salName:"")+" - [description]\n"+
    "Justificatifs : "+ndfRef+"_01 à _"+String(ndfLines.length).padStart(2,"0")+"\n"+
    (ndfLines[0]?.act?"Code projet reporté depuis la NDF":""));
}

function getMissing(){const nums={F:[],P:[],S:[],RF:[]};Object.values(D.att).forEach(a=>{if(!a.nj)return;const m=a.nj.match(/^(F|P|S|RF)2026-(\d+)$/);if(m)nums[m[1]].push(parseInt(m[2]))});
  const miss=[];for(const[p,arr] of Object.entries(nums)){if(!arr.length)continue;arr.sort((a,b)=>a-b);for(let i=1;i<=Math.max(...arr);i++){if(!arr.includes(i))miss.push(p+"2026-"+String(i).padStart(3,"0"))}}return miss}

// ─── SUGGEST RECURRING LABELS ───
function getSuggestions(){const freq={};D.rows.forEach(r=>{if(!r.lib)return;
  // Extract keywords from libellé
  const words=r.lib.toUpperCase().replace(/[0-9]{4,}/g,"").replace(/\s+/g," ").trim().split(" ").filter(w=>w.length>3);
  words.forEach(w=>{freq[w]=(freq[w]||0)+1})});
  // Find frequent words not already in rules
  const ruleWords=D.rules.map(r=>r.match.toUpperCase());
  return Object.entries(freq).filter(([w,n])=>n>=3&&!ruleWords.some(rw=>w.includes(rw)||rw.includes(w))).sort((a,b)=>b[1]-a[1]).slice(0,15)}

function addBudgetLine(){D.budget.push({cat:"",type:"charge",versions:D.budgetVersions.map(()=>0),seasonMode:"lisse",months:[]});sortBudget();autoSave();render()}

function addBudgetVersion(){const name=prompt("Nom de la version (ex: Révisé T2)");if(!name)return;D.budgetVersions.push(name);D.budget.forEach(b=>{if(!b.versions)b.versions=[];b.versions.push(0)});autoSave();render()}
function toggleBudgetMonth(i,mi){if(!D.budget[i].months)D.budget[i].months=[];const idx=D.budget[i].months.indexOf(mi);if(idx>=0)D.budget[i].months.splice(idx,1);else D.budget[i].months.push(mi);autoSave();render()}

// ─── COMPARATIF PRÉVISIONNEL vs RÉALISÉ ───
function rComp(el){
  const now=new Date();const curMonth=now.getMonth();// 0-indexed
  const elapsed=(curMonth+1)/12;// % of year elapsed
  const vIdx=D.budgetVersions.length-1;// Latest version

  // Compute realized by cat
  const realized={};
  D.rows.filter(r=>r.yr===compYear&&r.cat).forEach(r=>{
    if(!realized[r.cat])realized[r.cat]={deb:0,cre:0,byMonth:{}};
    realized[r.cat].deb+=r.deb||0;realized[r.cat].cre+=r.cre||0;
    const mi=parseInt((r.dt||"").substring(5,7))-1;
    if(!realized[r.cat].byMonth[mi])realized[r.cat].byMonth[mi]={deb:0,cre:0};
    realized[r.cat].byMonth[mi].deb+=r.deb||0;realized[r.cat].byMonth[mi].cre+=r.cre||0;
  });

  // Compute expected by month for each budget line
  function expectedToMonth(b,upToMonth){
    const annual=b.versions?.[vIdx]||0;
    if(b.seasonMode==="lisse")return annual*((upToMonth+1)/12);
    if(!b.months||!b.months.length)return annual*((upToMonth+1)/12);
    const totalMonths=b.months.length;const passedMonths=b.months.filter(m=>m<=upToMonth).length;
    return annual*(passedMonths/totalMonths);
  }

  // Dashboard
  const totBudgetCh=D.budget.filter(b=>b.type==="charge").reduce((s,b)=>s+(b.versions?.[vIdx]||0),0);
  const totBudgetPr=D.budget.filter(b=>b.type==="produit").reduce((s,b)=>s+(b.versions?.[vIdx]||0),0);
  const totRealCh=D.rows.filter(r=>r.yr===compYear).reduce((s,r)=>s+(r.deb||0),0);
  const totRealPr=D.rows.filter(r=>r.yr===compYear).reduce((s,r)=>s+(r.cre||0),0);
  const pctCh=totBudgetCh>0?(totRealCh/totBudgetCh*100):0;
  const pctPr=totBudgetPr>0?(totRealPr/totBudgetPr*100):0;
  const projection=totBudgetCh>0?(totRealCh/elapsed):0;

  let h='<div class="dash">';
  h+=`<div class="dash-c"><div class="dash-v" style="color:#818cf8">${fmtP(elapsed*100)}</div><div class="dash-l">Année écoulée</div></div>`;
  h+=`<div class="dash-c"><div class="dash-v ${pctCh>elapsed*100+10?"alert-danger":pctCh>elapsed*100?"alert-warn":"alert-ok"}">${fmtP(pctCh)}</div><div class="dash-l">Charges consommées</div></div>`;
  h+=`<div class="dash-c"><div class="dash-v ${pctPr<elapsed*100-15?"alert-warn":"alert-ok"}">${fmtP(pctPr)}</div><div class="dash-l">Produits encaissés</div></div>`;
  h+=`<div class="dash-c"><div class="dash-v" style="color:#f87171">${fmt(totRealCh)}</div><div class="dash-l">Réalisé charges</div></div>`;
  h+=`<div class="dash-c"><div class="dash-v" style="color:#4ade80">${fmt(totRealPr)}</div><div class="dash-l">Réalisé produits</div></div>`;
  h+=`<div class="dash-c"><div class="dash-v" style="color:${projection>totBudgetCh*1.05?"#ef4444":"#22c55e"}">${fmt(projection)}</div><div class="dash-l">Projection annuelle charges</div></div>`;
  h+='</div>';

  // Table
  h+='<div style="overflow-x:auto"><table><thead><tr><th>Code comptable</th><th>Type</th><th style="text-align:right">Prévu</th><th style="text-align:right">Attendu à date</th><th style="text-align:right">Réalisé</th><th style="text-align:right">%</th><th style="min-width:120px">Progression</th><th>Alerte</th></tr></thead><tbody>';

  D.budget.forEach(b=>{
    const annual=b.versions?.[vIdx]||0;if(!annual)return;
    const expected=expectedToMonth(b,curMonth);
    const real=realized[b.cat];
    const realVal=b.type==="charge"?(real?.deb||0):(real?.cre||0);
    const pct=annual>0?(realVal/annual*100):0;
    const vsExpected=expected>0?(realVal/expected*100):0;
    let alert="",alertClass="alert-ok",barColor="#22c55e";
    if(pct>100){alert="🔴 Dépassé";alertClass="alert-danger";barColor="#ef4444"}
    else if(vsExpected>120){alert="🟠 En avance";alertClass="alert-warn";barColor="#f59e0b"}
    else if(b.type==="produit"&&vsExpected<60){alert="🟡 Retard";alertClass="alert-warn";barColor="#f59e0b"}
    else{alert="✅";barColor="#22c55e"}

    h+=`<tr><td style="font-size:9px;font-weight:600">${b.cat||"—"}</td>
      <td style="font-size:8px;color:${b.type==="charge"?"#f87171":"#4ade80"}">${b.type}</td>
      <td style="text-align:right;font-size:9px">${fmt(annual)}</td>
      <td style="text-align:right;font-size:9px;color:#64748b">${fmt(expected)}</td>
      <td style="text-align:right;font-weight:600;color:${b.type==="charge"?"#f87171":"#4ade80"}">${fmt(realVal)}</td>
      <td style="text-align:right;font-weight:600">${fmtP(pct)}</td>
      <td><div class="pbar"><div class="pbar-f" style="width:${Math.min(pct,100)}%;background:${barColor}"></div><div class="pbar-t">${fmtP(pct)}</div></div></td>
      <td style="font-size:9px" class="${alertClass}">${alert}</td></tr>`;
  });
  h+='</tbody></table></div>';el.innerHTML=h;
}

// ─── TREASURY FORECAST ───
function rTreasury(el){
  const vIdx=D.budgetVersions.length-1;
  const subs=D.airtableSubs||[];
  let h='<div style="padding:10px 14px"><h3 style="font-size:13px;margin-bottom:4px">💰 Prévision de trésorerie '+compYear+'</h3>';
  h+=`<p style="font-size:9px;color:#94a3b8;margin-bottom:4px">Solde initial au <strong>${D.soldeDate||"?"}</strong> : <strong style="color:#818cf8">${fmt(D.soldeInitial)}</strong></p>`;
  // Airtable sync info + filters
  h+=`<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;font-size:9px;color:#94a3b8">`;
  h+=`<span>🔄 Airtable : ${D.airtableSync||"jamais"} (${subs.length} subventions)</span>`;
  h+=`<label><input type="checkbox" ${tresFilt.versee?"checked":""} onchange="tresFilt.versee=this.checked;render()"> ✅ Versées</label>`;
  h+=`<label><input type="checkbox" ${tresFilt.validee?"checked":""} onchange="tresFilt.validee=this.checked;render()"> 🔵 Validées</label>`;
  h+=`<label><input type="checkbox" ${tresFilt.attente?"checked":""} onchange="tresFilt.attente=this.checked;render()"> 🟡 Attente</label>`;
  h+=`<label><input type="checkbox" ${tresFilt.sollicitee?"checked":""} onchange="tresFilt.sollicitee=this.checked;render()"> 🟠 Sollicitées</label>`;
  h+=`</div>`;

  // Filters from state
  const fV=tresFilt.versee,fA2=tresFilt.validee;
  const fAt=tresFilt.attente,fS=tresFilt.sollicitee;

  // Compute monthly forecast
  const forecastCh=MOS.map(()=>0),forecastPr=MOS.map(()=>0),airtableSub=MOS.map(()=>0),airtablePrest=MOS.map(()=>0);
  const realCh=MOS.map(()=>0),realPr=MOS.map(()=>0);
  const prestas=D.airtablePrestas||[];

  // Charges from budget
  D.budget.filter(b=>b.type==="charge").forEach(b=>{
    const annual=b.versions?.[vIdx]||0;if(!annual)return;
    if(b.seasonMode==="mois"&&b.months?.length){
      const perMonth=annual/b.months.length;b.months.forEach(mi=>{forecastCh[mi]+=perMonth});
    }else{const pm=annual/12;MOS.forEach((m,mi)=>{forecastCh[mi]+=pm})}
  });

  // Subventions from Airtable (with filters)
  subs.forEach(s=>{
    const dp=s.dp||"";if(!dp.startsWith(compYear))return;
    const show=(s.s==="versée"&&fV)||(s.s==="validée"&&fA2)||(s.s==="attente"&&fAt)||(s.s==="sollicitée"&&fS);
    if(!show)return;
    const mi=parseInt(dp.substring(5,7))-1;
    if(mi>=0&&mi<12)airtableSub[mi]+=(s.ob||s.mt||0);
  });

  // Prestations from Airtable (with filters: signé/payé=validée, facturé=validée, négo=sollicitée)
  prestas.forEach(p=>{
    const dp=p.dp||"";if(!dp.startsWith(compYear))return;
    const isConfirmed=p.s==="signé"||p.s==="payé"||p.s==="facturé";
    const isNego=p.s==="négo";
    const show=(isConfirmed&&(fA2||fV))||(isNego&&fS);
    if(!show)return;
    const mi=parseInt(dp.substring(5,7))-1;
    if(mi>=0&&mi<12)airtablePrest[mi]+=(p.ob||p.mt||0);
  });

  // Non-subvention/presta produits from budget (dons, cotisations, etc.)
  D.budget.filter(b=>b.type==="produit").forEach(b=>{
    const annual=b.versions?.[vIdx]||0;if(!annual)return;
    const cat=(b.cat||"").substring(0,5);
    // Skip categories fed by Airtable (74xxx subventions, 70xxx prestations, 75412 mécénat)
    if(cat.startsWith("744")||cat.startsWith("748")||cat.startsWith("706")||(b.cat||"").startsWith("75412"))return;
    if(b.seasonMode==="mois"&&b.months?.length){
      const perMonth=annual/b.months.length;b.months.forEach(mi=>{forecastPr[mi]+=perMonth});
    }else{const pm=annual/12;MOS.forEach((m,mi)=>{forecastPr[mi]+=pm})}
  });

  // Total forecast produits = budget non-sub + airtable subs + airtable prestas
  const totForecastPr=MOS.map((m,i)=>forecastPr[i]+airtableSub[i]+airtablePrest[i]);

  // Real data by month
  D.rows.filter(r=>r.yr===compYear).forEach(r=>{const mi=parseInt((r.dt||"").substring(5,7))-1;if(mi>=0&&mi<12){realCh[mi]+=r.deb||0;realPr[mi]+=r.cre||0}});

  h+='<div style="overflow-x:auto"><table><thead><tr><th></th>';
  MONAMES.forEach(m=>h+=`<th style="text-align:right;min-width:70px">${m}</th>`);
  h+='<th style="text-align:right;font-weight:700">TOTAL</th></tr></thead><tbody>';

  // Forecast charges
  h+='<tr><td style="font-weight:600;color:#f87171">Charges prévues</td>';
  let totFC=0;forecastCh.forEach(v=>{totFC+=v;h+=`<td style="text-align:right;font-size:9px;color:#f8717188">${fmt(v)}</td>`});
  h+=`<td style="text-align:right;font-weight:600;color:#f87171">${fmt(totFC)}</td></tr>`;

  // Real charges
  h+='<tr><td style="font-weight:600;color:#f87171">Charges réelles</td>';
  let totRC=0;realCh.forEach(v=>{totRC+=v;h+=`<td style="text-align:right;font-size:9px;color:#f87171">${fmt(v)}</td>`});
  h+=`<td style="text-align:right;font-weight:600;color:#f87171">${fmt(totRC)}</td></tr>`;

  // Airtable subventions row
  h+='<tr><td style="font-weight:600;color:#818cf8">Subventions (Airtable)</td>';
  let totAT=0;airtableSub.forEach(v=>{totAT+=v;h+=`<td style="text-align:right;font-size:9px;color:#818cf8">${v?fmt(v):""}</td>`});
  h+=`<td style="text-align:right;font-weight:600;color:#818cf8">${fmt(totAT)}</td></tr>`;

  h+='<tr><td style="font-weight:600;color:#a78bfa">Prestations (Airtable)</td>';
  let totPR=0;airtablePrest.forEach(v=>{totPR+=v;h+=`<td style="text-align:right;font-size:9px;color:#a78bfa">${v?fmt(v):""}</td>`});
  h+=`<td style="text-align:right;font-weight:600;color:#a78bfa">${fmt(totPR)}</td></tr>`;

  // Other produits (prestas, dons...)
  h+='<tr><td style="font-weight:600;color:#4ade80">Autres produits prévus</td>';
  let totOP=0;forecastPr.forEach(v=>{totOP+=v;h+=`<td style="text-align:right;font-size:9px;color:#4ade8088">${fmt(v)}</td>`});
  h+=`<td style="text-align:right;font-weight:600;color:#4ade80">${fmt(totOP)}</td></tr>`;

  // Real produits
  h+='<tr><td style="font-weight:600;color:#4ade80">Produits réels</td>';
  let totRP=0;realPr.forEach(v=>{totRP+=v;h+=`<td style="text-align:right;font-size:9px;color:#4ade80">${fmt(v)}</td>`});
  h+=`<td style="text-align:right;font-weight:600;color:#4ade80">${fmt(totRP)}</td></tr>`;

  // Solde prévisionnel cumulé
  h+='<tr style="border-top:2px solid #6366f1"><td style="font-weight:700">Solde prévu cumulé</td>';

// ─── AIRTABLE SYNC ───
function importAirtable(){
  const inp=document.createElement("input");inp.type="file";inp.accept=".json";
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();
    rd.onload=ev=>{try{
      const d=JSON.parse(ev.target.result);
      pushUndo();
      if(d.airtableSubs){D.airtableSubs=d.airtableSubs;D.airtableSync=d.airtableSync||new Date().toISOString().split("T")[0]}
      if(d.airtablePrestas){D.airtablePrestas=d.airtablePrestas}
      if(d.acts){
        const existing=new Set(D.acts.map(a=>a.l.split(" - ")[0].trim()));
        d.acts.forEach(a=>{if(!existing.has(a.l.split(" - ")[0].trim()))D.acts.push(a)});
      }
      autoSave();render();
      alert("Données Airtable importées ! ("+(d.airtableSubs?.length||0)+" subventions, sync "+D.airtableSync+")");
    }catch(e){alert("Erreur: "+e.message)}};rd.readAsText(f)};inp.click();
}

  const miss=getMissing();const allA=Object.entries(D.att).map(([k,a])=>({rid:k,...a}));
  let h='<div style="padding:12px 14px">';
  h+='<h3 style="font-size:12px;margin-bottom:8px">⚠️ Numéros manquants</h3>';
  if(!miss.length)h+='<div style="color:#22c55e;font-size:10px;margin-bottom:12px">✓ OK</div>';
  else{h+='<table style="margin-bottom:12px"><thead><tr><th>N° manquant</th><th>Déposer</th><th>Résultat</th></tr></thead><tbody>';
    miss.forEach((m,i)=>{h+=`<tr><td style="font-weight:600;color:#f59e0b">${m}</td><td><input type="file" id="mf_${i}" accept=".pdf,.jpg,.jpeg,.png" style="font-size:8px;width:140px"><button class="b bb" style="margin-left:3px" onclick="attMiss(${i},'${m}')">📎</button></td><td id="mr_${i}" style="font-size:8px;color:#64748b">—</td></tr>`});
    h+='</tbody></table>'}
  h+=`<h3 style="font-size:12px;margin-bottom:8px">📄 Tous les justificatifs (${allA.length})</h3>`;
  if(allA.length){h+='<table><thead><tr><th>N°</th><th>Fichier renommé</th><th>Original</th><th>Ligne</th><th></th></tr></thead><tbody>';
    allA.sort((a,b)=>(a.nj||"").localeCompare(b.nj||"")).forEach(a=>{const r=D.rows.find(x=>x.id===a.rid);
      h+=`<tr><td style="font-weight:600;color:#818cf8">${a.nj}</td><td style="color:#22c55e">${a.name}</td><td style="color:#64748b;font-size:8px">${a.orig||"—"}</td><td style="font-size:8px;max-width:200px;overflow:hidden;text-overflow:ellipsis">${r?r.dt+" | "+r.lib.substring(0,30):"—"}</td><td><button class="att has" onclick="viewAtt('${a.rid}')">👁</button></td></tr>`});
    h+='</tbody></table>'}
  const noA=D.rows.filter(r=>!D.att[r.id]);
  if(noA.length){h+=`<h3 style="font-size:12px;margin:12px 0 8px">📎 ${noA.length} sans justificatif</h3><table><thead><tr><th>Date</th><th>Libellé</th><th>Montant</th><th></th></tr></thead><tbody>`;
    noA.slice(0,30).forEach(r=>{h+=`<tr><td style="font-size:8px;color:#64748b">${r.dt}</td><td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.lib}</td><td class="${r.deb?"deb":"cre"}">${r.deb?fmt(r.deb):fmt(r.cre)}</td><td><button class="b bb" style="font-size:7px" onclick="attRow('${r.id}')">📎</button></td></tr>`});
    h+='</tbody></table>'}
  h+='</div>';el.innerHTML=h}

function attMiss(i,nj){const fi=$("mf_"+i);if(!fi?.files?.length)return;const f=fi.files[0];const rd=new FileReader();
  rd.onload=ev=>{const ext=f.name.split(".").pop().toLowerCase();D.att["miss_"+nj]={data:ev.target.result,name:nj+"."+ext,orig:f.name,type:f.type,ext,nj};
    const m=nj.match(/^(F|P|S|RF)2026-(\d+)$/);if(m){const n=parseInt(m[2]);if(n>=D.ctr[m[1]])D.ctr[m[1]]=n}
    $("mr_"+i).innerHTML=`<span style="color:#22c55e">✓ ${nj}.${ext}</span> <button class="att has" onclick="viewAtt('miss_${nj}')" style="margin-left:3px">👁</button>`;
    autoSave()};rd.readAsArrayBuffer(f)}

render();
</script>
</body>
</html>
